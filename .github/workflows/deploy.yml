name: Deploy to GitHub Pages

on:
  # Rebuild & deploy on every push to main
  push:
    branches: [main]
  # Allow manual runs from the Actions tab (works anytime, even after the cutoff)
  workflow_dispatch:
  # Pull the live calendar feed and redeploy once a day (13:17 UTC).
  # Scheduled runs stop doing work after 2026-06-24 (see the `gate` job) — the
  # schedule is final by then, so no further automatic rebuilds are needed.
  schedule:
    - cron: "17 13 * * *"

# Permissions required by the GitHub Pages deploy action.
# `contents: write` lets the build commit the rolling event baseline back to the repo.
permissions:
  contents: write
  pages: write
  id-token: write

# Only one Pages deploy at a time; let a newer run cancel an in-flight one
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Decide whether to build. Push / manual runs always build. Scheduled runs
  # only build up to and including 2026-06-24, then quietly skip forever after.
  gate:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.decide.outputs.build }}
    steps:
      - id: decide
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "Triggered by ${{ github.event_name }} — building."
          elif [ "$(date -u +%Y%m%d)" -le 20260624 ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "Scheduled run on/before 2026-06-24 — building."
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "Past 2026-06-24 — schedule is final; skipping automatic rebuild."
          fi

  build:
    needs: gate
    if: needs.gate.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull the live Vibecamp .ics feed
        # If the feed is unreachable, fall back to the committed snapshot so a
        # transient outage never breaks the daily deploy.
        run: npm run refresh:data || echo "::warning::feed fetch failed; using committed events.json"

      - name: Persist event baseline
        # During the pre-June-18 tracking window, refresh:data folds new UIDs into
        # src/known-events.json. Commit it back so the baseline survives to the next
        # run. [skip ci] keeps this commit from triggering a redundant deploy.
        # From June 18 the baseline is frozen, so this is a no-op (nothing to commit).
        run: |
          if ! git diff --quiet -- src/known-events.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/known-events.json
            git commit -m "chore(data): update event baseline [skip ci]"
            # Best-effort: if the repo's Actions permissions are read-only the push
            # fails, but the build must not — this run already has a correct baseline
            # in memory; it just won't persist to the next run.
            git push origin HEAD:main || echo "::warning::baseline push failed (check Settings → Actions → Workflow permissions = Read and write); deploy continues"
          else
            echo "Event baseline unchanged — nothing to commit."
          fi

      - name: Build static site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
